<div class="answer-stats" aria-live="polite">
  <span class="stats-item stats-correct"><span aria-hidden="true">&check;</span> {{ score() }}</span>
  <span class="stats-item stats-wrong"><span aria-hidden="true">&times;</span> {{ wrongAnswers() }}</span>
</div>

@if (!isFinished() && currentCountry(); as country) {
  <img [src]="country.flagSvgPath" [alt]="country.namesRu[0]">

  <form [formGroup]="form" (ngSubmit)="submitAnswer()">
    <input class="answer" type="text" formControlName="answer">
    <button type="submit">Проверить</button>
  </form>

  @if (lastAnswerCorrect() !== null) {
    <p class="answer-result" [class.correct]="lastAnswerCorrect()" [class.wrong]="!lastAnswerCorrect()">
      {{ lastAnswerCorrect() ? 'Верный ответ' : 'Ошибка' }}
    </p>
  }

  <p>{{ currentIndex() + 1 }} / {{ countries().length }}</p>
} @else {
  <p>Игра окончена. Счёт: {{ score() }}</p>
}
